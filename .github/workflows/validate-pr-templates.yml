name: Validate PR Templates

on:
  pull_request:
    paths:
      - '.scaffolding/templates/pr/**'
      - '.scaffolding/scripts/generate-pr-template.sh'
      - 'config.toml.example'
  push:
    branches:
      - main
    paths:
      - '.scaffolding/templates/pr/**'
      - '.scaffolding/scripts/generate-pr-template.sh'
      - 'config.toml.example'
  workflow_dispatch:

jobs:
  validate-templates:
    name: Validate PR Templates
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Check template files exist
        run: |
          echo "Checking PR template files..."
          
          REQUIRED_TEMPLATES=(
            "template.en-US.md"
            "template.zh-TW.md"
            "template.zh-CN.md"
            "template.ja-JP.md"
            "custom-instructions.en-US.md"
            "custom-instructions.zh-TW.md"
          )
          
          MISSING=0
          for template in "${REQUIRED_TEMPLATES[@]}"; do
            if [ ! -f ".scaffolding/templates/pr/$template" ]; then
              echo "✗ Missing: $template"
              MISSING=$((MISSING + 1))
            else
              echo "✓ Found: $template"
            fi
          done
          
          if [ $MISSING -gt 0 ]; then
            echo "❌ $MISSING template file(s) missing"
            exit 1
          fi
          
          echo "✅ All PR template files exist"
      
      - name: Validate template structure
        run: |
          echo "Validating PR template structure..."
          
          REQUIRED_SECTIONS=(
            "## Summary"
            "## Type of Change"
            "## Changes Made"
            "## Testing"
            "## Checklist"
          )
          
          for template in .scaffolding/templates/pr/template.*.md; do
            echo "Checking $template..."
            
            MISSING_SECTIONS=0
            for section in "${REQUIRED_SECTIONS[@]}"; do
              if ! grep -q "^$section" "$template"; then
                echo "  ✗ Missing section: $section"
                MISSING_SECTIONS=$((MISSING_SECTIONS + 1))
              fi
            done
            
            if [ $MISSING_SECTIONS -gt 0 ]; then
              echo "  ❌ $MISSING_SECTIONS required section(s) missing in $template"
              exit 1
            fi
            
            echo "  ✓ All sections present"
          done
          
          echo "✅ All templates have required sections"
      
      - name: Test generate-pr-template.sh syntax
        run: |
          echo "Testing generate-pr-template.sh..."
          
          if bash -n .scaffolding/scripts/generate-pr-template.sh; then
            echo "✅ Script has valid bash syntax"
          else
            echo "❌ Script has syntax errors"
            exit 1
          fi
      
      - name: Test PR template generation (dry-run)
        run: |
          echo "Testing PR template generation..."
          
          # Create temporary config for testing
          mkdir -p /tmp/test-pr-gen
          cd /tmp/test-pr-gen
          
          for lang in "zh-TW" "en-US" "zh-CN" "ja-JP"; do
            echo "Testing language: $lang"
            
            cat > config.toml <<EOF
[locale]
primary = "$lang"
fallback = "en-US"

[github]
use_pr_template = true
EOF
            
            # Set PROJECT_ROOT env var for the script
            export PROJECT_ROOT="${GITHUB_WORKSPACE}"
            
            # Run script (it should not fail)
            if bash "${GITHUB_WORKSPACE}/.scaffolding/scripts/generate-pr-template.sh"; then
              echo "  ✓ $lang generation succeeded"
            else
              echo "  ✗ $lang generation failed"
              exit 1
            fi
          done
          
          echo "✅ All languages generate successfully"
      
      - name: Summary
        if: always()
        run: |
          echo "================================================"
          echo "  PR Template Validation Summary"
          echo "================================================"
          echo ""
          echo "✅ Template files validated"
          echo "✅ Template structure validated"
          echo "✅ Generation script validated"
          echo ""
          echo "All PR template checks passed!"
