# GitHub Templates translations for English (United States)
# BCP 47 Language Tag: en-US

[meta]
language_tag = "en-US"
language_name = "English (United States)"
language_native = "English (US)"

# Bug Report Template
[bug_report]
name = "Bug Report"
about = "Report a problem or bug in the project"
title_prefix = "[BUG] "
description_title = "## Problem Description"
description_comment = "<!-- Clearly and concisely describe this bug -->"
steps_title = "## Steps to Reproduce"
steps_comment = "<!-- How to reproduce this issue? -->"
step1 = "1. Go to '...'"
step2 = "2. Click on '...'"
step3 = "3. Scroll down to '...'"
step4 = "4. See error"
expected_title = "## Expected Behavior"
expected_comment = "<!-- Describe what you expected to happen -->"
actual_title = "## Actual Behavior"
actual_comment = "<!-- Describe what actually happened -->"
screenshots_title = "## Screenshots"
screenshots_comment = "<!-- If applicable, add screenshots to illustrate the problem -->"
environment_title = "## Environment Information"
environment_comment = "<!-- Please fill in the following information -->"
env_os = "- Operating System: [e.g., macOS 13.0, Windows 11, Ubuntu 22.04]"
env_browser = "- Browser (if applicable): [e.g., Chrome 120, Firefox 121, Safari 17]"
env_version = "- Project Version: [e.g., v1.2.3 or commit hash]"
env_node = "- Node.js Version (if applicable): [e.g., v20.10.0]"
env_python = "- Python Version (if applicable): [e.g., 3.11.5]"
additional_title = "## Additional Information"
additional_comment = "<!-- Any other information that helps understand or resolve the issue -->"
logs_title = "## Error Messages or Logs"
logs_comment = "<!-- If there are error messages or logs, paste them below -->"
logs_placeholder = "Please paste error messages or logs here"
solution_title = "## Possible Solution"
solution_comment = "<!-- Optional: If you have ideas, share possible solutions -->"

# Feature Request Template
[feature_request]
name = "Feature Request"
about = "Suggest a new feature or improvement for this project"
title_prefix = "[FEATURE] "
description_title = "## Feature Description"
description_comment = "<!-- Clearly and concisely describe the feature you want -->"
problem_title = "## Problem or Need"
problem_comment = "<!-- What problem does this feature solve? Why is this feature needed? -->"
solution_title = "## Suggested Solution"
solution_comment = "<!-- Describe how you'd like to implement this feature -->"
alternatives_title = "## Alternatives"
alternatives_comment = "<!-- Describe other alternative solutions or features you've considered -->"
use_cases_title = "## Use Cases"
use_cases_comment = "<!-- Describe specific use cases and scenarios for this feature -->"
use_case1 = "1. Scenario 1: ..."
use_case2 = "2. Scenario 2: ..."
benefits_title = "## Expected Benefits"
benefits_comment = "<!-- What benefits will this feature bring? -->"
benefit1 = "- Benefit 1: ..."
benefit2 = "- Benefit 2: ..."
implementation_title = "## Possible Implementation"
implementation_comment = "<!-- Optional: If you have technical implementation ideas, please share -->"
additional_title = "## Additional Information"
additional_comment = "<!-- Any other information that helps understand this feature request -->"
references_title = "## References"
references_comment = "<!-- Optional: Related links, documents, or examples -->"
reference1 = "- [Reference 1](URL)"
reference2 = "- [Reference 2](URL)"
priority_title = "## Priority"
priority_comment = "<!-- Please rate the importance of this feature to you -->"
priority_blocker = "- [ ] Must have (Blocker)"
priority_high = "- [ ] Very important (High)"
priority_medium = "- [ ] Medium (Medium)"
priority_low = "- [ ] Nice to have (Low)"
willing_title = "## Willing to Help Develop"
willing_comment = "<!-- Are you willing to help implement this feature? -->"
willing_pr = "- [ ] Yes, I can submit a Pull Request"
willing_test = "- [ ] Yes, I can help with testing"
willing_info = "- [ ] Yes, I can provide more information"
willing_no = "- [ ] No, I'm just making a suggestion"

# Pull Request Template
[pull_request]
title_comment_intro = "PR Title Format (English only):"
title_comment_format = "  type(scope): brief description"
title_comment_examples = "  Examples:"
title_comment_ex1 = "  - feat(auth): add JWT authentication"
title_comment_ex2 = "  - fix(api): resolve memory leak in user service"
title_comment_ex3 = "  - docs(readme): update installation guide"
title_comment_ex4 = "  - refactor(core): simplify error handling logic"
type_title = "## Type"
type_comment = "<!-- Check one -->"
type_feat = "- [ ] feat - New feature"
type_fix = "- [ ] fix - Bug fix"
type_docs = "- [ ] docs - Documentation"
type_style = "- [ ] style - Code style (formatting, semicolons, etc)"
type_refactor = "- [ ] refactor - Code refactoring"
type_test = "- [ ] test - Tests"
type_chore = "- [ ] chore - Maintenance"
what_title = "## What"
what_comment = "<!-- Brief description in English and Chinese -->"
what_en = "**EN:**"
what_en_item = "- "
what_zh = "**ZH:**"
what_zh_item = "- "
why_title = "## Why"
why_comment = "<!-- Reason for this change -->"
why_en = "**EN:**"
why_zh = "**ZH:**"
related_title = "## Related Issue"
related_comment = "<!-- If applicable -->"
related_closes = "Closes #"
testing_title = "## Testing"
testing_comment = "<!-- How to verify this change -->"
testing_en = "**EN:**"
testing_zh = "**ZH:**"
checklist_title = "## Checklist"
checklist_tests = "- [ ] Tests pass"
checklist_style = "- [ ] Code follows style guide (see AGENTS.md)"
checklist_docs = "- [ ] Documentation updated"
checklist_breaking = "- [ ] No breaking changes (or documented)"
