ai_prompt = "Apply scaffolding from https://github.com/matheme-justyn/my-vibe-scaffolding to current project"
how_it_works = "**AI will automatically detect and handle:**"
scenario_a_title = "### Scenario A: Existing Project"
scenario_a = "If current directory has project files (`.git/`, `package.json`, etc.):
1. Download `.scaffolding/` directory from GitHub
2. Download `AGENTS.md`, `config.toml.example`
3. Run `./.scaffolding/scripts/init-project.sh`
4. Script detects no `.template-version` → **First-time mode**"
scenario_b_title = "### Scenario B: New Project from Template"
scenario_b = "If creating a brand new project:
1. Click **\"Use this template\"** on GitHub
2. Clone your new repository
3. Run `./.scaffolding/scripts/init-project.sh`
4. Script detects no `.template-version` → **First-time mode**"
key_benefit = "**Key benefit**: One prompt for all scenarios — AI handles the rest"

[unified_command]
title = "How the Script Works"
description = "The `init-project.sh` script intelligently detects your situation:"
first_time_mode = "**First-time mode** (no `.template-version` file):
- Asks for project information
- Creates VERSION, README.md, LICENSE
- Sets up Git hooks
- Creates `.template-version` to track which template version you're using"
update_mode = "**Update mode** (`.template-version` exists):
- Compares current version with template version
- Consolidates agent configs (`.claude`, `.roo` → `.agents`)
- Reinstalls Git hooks (may have new features)
- Updates `.template-version`"
when_to_run = "**When to run manually:**
- After cloning new project from template
- When you want to update template features
- When consolidating scattered agent configurations"

