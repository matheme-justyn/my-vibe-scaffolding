name: Validate Configuration Files

on:
  pull_request:
    paths:
      - 'config.toml'
      - 'config.toml.example'
      - '.scaffolding/scripts/configure-project-type.sh'
  push:
    branches:
      - main
    paths:
      - 'config.toml'
      - 'config.toml.example'
      - '.scaffolding/scripts/configure-project-type.sh'
  workflow_dispatch:

jobs:
  validate-config:
    name: Validate Configuration Files
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install TOML validator
        run: |
          pip install toml
      
      - name: Validate config.toml.example structure
        run: |
          echo "Validating config.toml.example..."
          
          python3 <<EOF
import toml
import sys

try:
    with open('config.toml.example', 'r') as f:
        config = toml.load(f)
    
    # Check required sections
    required_sections = ['project', 'locale', 'modules', 'academic', 'services']
    missing_sections = []
    
    for section in required_sections:
        if section not in config:
            missing_sections.append(section)
            print(f"✗ Missing section: [{section}]")
        else:
            print(f"✓ Found section: [{section}]")
    
    if missing_sections:
        print(f"❌ {len(missing_sections)} required section(s) missing")
        sys.exit(1)
    
    # Validate [project] section
    if 'type' not in config['project']:
        print("✗ [project] missing 'type' field")
        sys.exit(1)
    
    valid_types = ['frontend', 'backend', 'fullstack', 'cli', 'library', 'academic', 'documentation']
    if config['project']['type'] not in valid_types:
        print(f"✗ [project].type has invalid value: {config['project']['type']}")
        print(f"   Valid values: {', '.join(valid_types)}")
        sys.exit(1)
    
    print(f"✓ [project].type is valid: {config['project']['type']}")
    
    # Validate [locale] section
    if 'primary' not in config['locale']:
        print("✗ [locale] missing 'primary' field")
        sys.exit(1)
    
    print(f"✓ [locale].primary is set: {config['locale']['primary']}")
    
    # Validate [academic] section (if present)
    if 'academic' in config:
        if 'citation_style' in config['academic']:
            valid_styles = ['apa', 'mla', 'chicago', 'ieee', 'acm']
            if config['academic']['citation_style'] not in valid_styles:
                print(f"✗ [academic].citation_style invalid: {config['academic']['citation_style']}")
                sys.exit(1)
            print(f"✓ [academic].citation_style valid: {config['academic']['citation_style']}")
    
    print("")
    print("✅ config.toml.example is valid")
    
except toml.TomlDecodeError as e:
    print(f"❌ TOML syntax error: {e}")
    sys.exit(1)
except Exception as e:
    print(f"❌ Validation error: {e}")
    sys.exit(1)
EOF
      
      - name: Check configure-project-type.sh syntax
        run: |
          echo "Checking configure-project-type.sh syntax..."
          
          if bash -n .scaffolding/scripts/configure-project-type.sh; then
            echo "✅ Script has valid bash syntax"
          else
            echo "❌ Script has syntax errors"
            exit 1
          fi
      
      - name: Validate module configuration
        run: |
          echo "Validating module configuration..."
          
          python3 <<EOF
import toml

with open('config.toml.example', 'r') as f:
    config = toml.load(f)

# Check [modules] section
if 'modules' not in config:
    print("✗ [modules] section missing")
    exit(1)

modules_config = config['modules']

# Check always_enabled modules
if 'always_enabled' in modules_config:
    always_modules = modules_config['always_enabled']
    print(f"✓ Always-enabled modules: {len(always_modules)}")
    
    # Core modules should always be enabled
    core_modules = ['STYLE_GUIDE', 'GIT_WORKFLOW', 'ACADEMIC_WRITING', 'CITATION_MANAGEMENT']
    for module in core_modules:
        if module in always_modules:
            print(f"  ✓ {module} is always enabled")
        else:
            print(f"  ℹ {module} not in always_enabled (may be conditional)")

print("")
print("✅ Module configuration is valid")
EOF
      
      - name: Test project type configuration examples
        run: |
          echo "Testing project type configurations..."
          
          declare -A PROJECT_TYPES=(
            ["frontend"]="React frontend application"
            ["backend"]="Node.js API server"
            ["fullstack"]="Next.js fullstack app"
            ["academic"]="Research thesis project"
          )
          
          for type in "${!PROJECT_TYPES[@]}"; do
            echo "Testing project type: $type (${PROJECT_TYPES[$type]})"
            
            cat > /tmp/test-config-$type.toml <<EOF
[project]
type = "$type"
mode = "project"
features = ["api", "database"]
quality = ["performance"]

[locale]
primary = "en-US"
fallback = "en-US"

[modules]
always_enabled = ["STYLE_GUIDE", "GIT_WORKFLOW"]
manual_enabled = []
manual_disabled = []

[academic]
citation_style = "apa"
field = "computer_science"

[services]
unsupported = []
EOF
            
            # Validate TOML syntax
            if python3 -c "import toml; toml.load(open('/tmp/test-config-$type.toml'))" 2>/dev/null; then
              echo "  ✓ $type configuration is valid"
            else
              echo "  ✗ $type configuration is invalid"
              exit 1
            fi
          done
          
          echo ""
          echo "✅ All project type configurations are valid"
      
      - name: Summary
        if: always()
        run: |
          echo "================================================"
          echo "  Configuration Validation Summary"
          echo "================================================"
          echo ""
          echo "✅ config.toml.example validated"
          echo "✅ TOML structure validated"
          echo "✅ Module configuration validated"
          echo "✅ Project type configurations validated"
          echo ""
          echo "All configuration checks passed!"
