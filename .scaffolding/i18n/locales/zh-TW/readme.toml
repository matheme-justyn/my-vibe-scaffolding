[installation]
title = "安裝"
ai_prompt_title = "**統一 AI Prompt（適用所有情境）：**"
ai_prompt = "請從 https://github.com/matheme-justyn/my-vibe-scaffolding 導入鷹架系統到目前專案"
how_it_works = "**AI 會自動偵測情境並處理：**"
scenario_a_title = "### 情境 A：現有專案導入鷹架"
scenario_a = "如果目前目錄已有專案檔案（`.git/`、`package.json` 等）：
1. 從 GitHub 下載 `.scaffolding/` 目錄
2. 下載 `AGENTS.md`、`config.toml.example`
3. 執行 `./.scaffolding/scripts/init-project.sh`
4. 腳本偵測無 `.template-version` → **首次安裝模式**"
scenario_b_title = "### 情境 B：建立全新專案"
scenario_b = "如果要建立全新專案：
1. 在 GitHub 點擊 **\"Use this template\"**
2. Clone 你的新 repository
3. 執行 `./.scaffolding/scripts/init-project.sh`
4. 腳本偵測無 `.template-version` → **首次安裝模式**"
key_benefit = "**核心優勢**：一個 prompt 搞定所有情境 — AI 自動處理剩下的"

[unified_command]
title = "腳本運作方式"
description = "`init-project.sh` 腳本會智慧偵測你的情況："
first_time_mode = "**首次模式**（無 `.template-version` 檔案）：
- 詢問專案資訊
- 建立 VERSION、README.md、LICENSE
- 設定 Git hooks
- 建立 `.template-version` 追蹤使用的模板版本"
update_mode = "**更新模式**（`.template-version` 已存在）：
- 比對目前版本與模板版本
- 整併 agent 配置（`.claude`、`.roo` → `.agents`）
- 重新安裝 Git hooks（可能有新功能）
- 更新 `.template-version`"
when_to_run = "**何時手動執行：**
- 從 template 建立新專案後
- 想要更新模板功能時
- 需要整併分散的 agent 配置時"

