# GitHub Templates translations for Traditional Chinese (Taiwan)
# BCP 47 Language Tag: zh-TW

[meta]
language_tag = "zh-TW"
language_name = "Traditional Chinese (Taiwan)"
language_native = "繁體中文（台灣）"

# Bug Report Template
[bug_report]
name = "Bug 回報"
about = "回報專案中的問題或錯誤"
title_prefix = "[BUG] "
description_title = "## 問題描述"
description_comment = "<!-- 清楚簡潔地描述這個 bug -->"
steps_title = "## 重現步驟"
steps_comment = "<!-- 如何重現這個問題？ -->"
step1 = "1. 前往 '...'"
step2 = "2. 點擊 '...'"
step3 = "3. 滾動到 '...'"
step4 = "4. 看到錯誤"
expected_title = "## 預期行為"
expected_comment = "<!-- 描述你預期應該發生什麼 -->"
actual_title = "## 實際行為"
actual_comment = "<!-- 描述實際發生了什麼 -->"
screenshots_title = "## 截圖"
screenshots_comment = "<!-- 如果適用，請新增截圖來說明問題 -->"
environment_title = "## 環境資訊"
environment_comment = "<!-- 請填寫以下資訊 -->"
env_os = "- 作業系統：[例如 macOS 13.0, Windows 11, Ubuntu 22.04]"
env_browser = "- 瀏覽器（如適用）：[例如 Chrome 120, Firefox 121, Safari 17]"
env_version = "- 專案版本：[例如 v1.2.3 或 commit hash]"
env_node = "- Node.js 版本（如適用）：[例如 v20.10.0]"
env_python = "- Python 版本（如適用）：[例如 3.11.5]"
additional_title = "## 額外資訊"
additional_comment = "<!-- 任何其他有助於理解或解決問題的資訊 -->"
logs_title = "## 錯誤訊息或日誌"
logs_comment = "<!-- 如果有錯誤訊息或日誌，請貼在下方 -->"
logs_placeholder = "請在此貼上錯誤訊息或日誌"
solution_title = "## 可能的解決方案"
solution_comment = "<!-- 可選：如果你有想法，請分享可能的解決方案 -->"

# Feature Request Template
[feature_request]
name = "功能請求"
about = "建議此專案的新功能或改進"
title_prefix = "[FEATURE] "
description_title = "## 功能描述"
description_comment = "<!-- 清楚簡潔地描述你想要的功能 -->"
problem_title = "## 問題或需求"
problem_comment = "<!-- 這個功能要解決什麼問題？為什麼需要這個功能？ -->"
solution_title = "## 建議的解決方案"
solution_comment = "<!-- 描述你希望如何實現這個功能 -->"
alternatives_title = "## 替代方案"
alternatives_comment = "<!-- 描述你考慮過的其他替代解決方案或功能 -->"
use_cases_title = "## 使用場景"
use_cases_comment = "<!-- 描述這個功能的具體使用場景和情境 -->"
use_case1 = "1. 場景一：..."
use_case2 = "2. 場景二：..."
benefits_title = "## 預期效益"
benefits_comment = "<!-- 這個功能會帶來什麼好處？ -->"
benefit1 = "- 好處一：..."
benefit2 = "- 好處二：..."
implementation_title = "## 可能的實作方式"
implementation_comment = "<!-- 可選：如果你有技術實作的想法，請分享 -->"
additional_title = "## 額外資訊"
additional_comment = "<!-- 任何其他有助於理解這個功能請求的資訊 -->"
references_title = "## 參考資料"
references_comment = "<!-- 可選：相關的連結、文件或範例 -->"
reference1 = "- [參考一](URL)"
reference2 = "- [參考二](URL)"
priority_title = "## 優先級"
priority_comment = "<!-- 請評估這個功能對你的重要性 -->"
priority_blocker = "- [ ] 必須有（Blocker）"
priority_high = "- [ ] 很重要（High）"
priority_medium = "- [ ] 中等（Medium）"
priority_low = "- [ ] 可有可無（Low）"
willing_title = "## 願意協助開發"
willing_comment = "<!-- 你願意協助實作這個功能嗎？ -->"
willing_pr = "- [ ] 是，我可以提交 Pull Request"
willing_test = "- [ ] 是，我可以協助測試"
willing_info = "- [ ] 是，我可以提供更多資訊"
willing_no = "- [ ] 否，我只是提出建議"

# Pull Request Template
[pull_request]
title_comment_intro = "PR Title Format (English only):"
title_comment_format = "  type(scope): brief description"
title_comment_examples = "  Examples:"
title_comment_ex1 = "  - feat(auth): add JWT authentication"
title_comment_ex2 = "  - fix(api): resolve memory leak in user service"
title_comment_ex3 = "  - docs(readme): update installation guide"
title_comment_ex4 = "  - refactor(core): simplify error handling logic"
type_title = "## Type | 類型"
type_comment = "<!-- Check one -->"
type_feat = "- [ ] feat - New feature | 新功能"
type_fix = "- [ ] fix - Bug fix | 修復問題"
type_docs = "- [ ] docs - Documentation | 文件更新"
type_style = "- [ ] style - Code style (formatting, semicolons, etc) | 程式碼風格"
type_refactor = "- [ ] refactor - Code refactoring | 重構"
type_test = "- [ ] test - Tests | 測試"
type_chore = "- [ ] chore - Maintenance | 維護性工作"
what_title = "## What | 做了什麼"
what_comment = "<!-- Brief description in English and Chinese -->"
what_en = "**EN:**"
what_en_item = "- "
what_zh = "**ZH:**"
what_zh_item = "- "
why_title = "## Why | 為什麼"
why_comment = "<!-- Reason for this change -->"
why_en = "**EN:**"
why_zh = "**ZH:**"
related_title = "## Related Issue | 相關 Issue"
related_comment = "<!-- If applicable -->"
related_closes = "Closes #"
testing_title = "## Testing | 測試"
testing_comment = "<!-- How to verify this change -->"
testing_en = "**EN:**"
testing_zh = "**ZH:**"
checklist_title = "## Checklist | 檢查清單"
checklist_tests = "- [ ] Tests pass | 測試通過"
checklist_style = "- [ ] Code follows style guide (see AGENTS.md) | 遵循編碼規範"
checklist_docs = "- [ ] Documentation updated | 文件已更新"
checklist_breaking = "- [ ] No breaking changes (or documented) | 無 breaking changes（或已記錄）"
